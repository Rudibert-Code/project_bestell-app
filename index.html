<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" type="image" href="./assets/logo/Chanese 1.png">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
</head>
<body>
    <header>
        <nav>
            <section class="nav-container">
                <a href="">
                    <img class="header-icon" src="./assets/logo/Logo 02.png" alt="bestell-app logo">
                </a>
                <a class="header-burger-menu" href="#">
                    <img class="header-icon" src="./assets/icon/menu.png" alt="menu icon">
                </a>
            </section>
        </nav>
        <img class="hero-logo" src="./assets/logo/logo.png" alt="icon depicts an AI rendering of a burger">  
    </header>
    <main>
        <section class="header-details">
            <section class="page-title">
                <h1 class="title">
                    <p class="color-a">Burger</p><p class="color-b">House</p>
                </h1>
                <div class="ratings">
                    <img class="ratings-icon" src="./assets/icon/star.png" alt="ratings out of 5 stars">
                    <p>4,5</p>
                    <p class="rating-votes">(315)</p>
                </div>
            </section>
            <p class="title-sub-text">The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </section>
        <section class="sticky-wide-screen" id="sticky-wide-screen"></section>
        <section class="food-section" id="burger-section">
            <section class="section-title">
                <img class="section-logo" src="./assets/logo/Chanese 1.png" alt="burger-icon">
                <p>Burger & Sandwiches</p>
            </section>
            <section class="dish-container" id="dish-container-a">
                <section class="dishes-base">
                    <img id="dish-img-" src="./assets/img/Rectangle 10.png" alt="">
                    <div class="dish-info">
                        <h2 class="dishes-text-size" id="dish-name-">Dish Name</h2>
                        <span id="dish-description-">it's good</span>
                    </div>
                    <div class="dish-info">
                        <p id="dish-price-">10,50€</p>
                        <button id="add-dish-" onclick="addDish()">...</button>
                    </div>
                </section>
            </section>
        </section>
        <section class="food-section" id="pizza-section">
        </section>
        <section class="food-section" id="salad-section">
        </section>
    </main>
    <footer></footer>
</body>
</html>
