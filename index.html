<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" type="image" href="./assets/logo/Chanese 1.png">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js"></script>
    <script src="./scripts/dishes-list.js"></script>
    <script src="./scripts/template.js"></script>
</head>
<body onload="init()">
    <header>
        <nav>
            <section class="nav-container">
                <a href="">
                    <img class="header-icon" src="./assets/logo/Logo 02.png" alt="bestell-app logo">
                </a>
                <a class="header-burger-menu" href="#">
                    <img class="header-icon" src="./assets/icon/menu.png" alt="menu icon">
                </a>
            </section>
        </nav>
        <img class="hero-logo" src="./assets/logo/logo.png" alt="icon depicts an AI rendering of a burger">  
    </header>
    <main>
        <section class="header-details">
            <section class="page-title">
                <h1 class="title">
                    <p class="color-a">Burger</p><p class="color-b">House</p>
                </h1>
                <div class="ratings">
                    <img class="ratings-icon" src="./assets/icon/star.png" alt="ratings out of 5 stars">
                    <p>4,5</p>
                    <p class="rating-votes">(315)</p>
                </div>
            </section>
            <p class="title-sub-text">The best of Burgers, Pizza, and Greens, all in one great place.</p>
        </section>   
        <section class="main-container">
            <section class="dishes">
            <section class="food-section" id="burger-section">
                <section class="section-title">
                    <img class="section-logo" src="./assets/logo/Icon-Chanese.png" alt="burger-icon">
                    <p>Burger & Sandwiches</p>
                </section>
            </section>
            <section class="food-section" id="pizza-section">
                <section class="section-title">
                    <img class="section-logo" src="./assets/logo/Icon-Pizza.png" alt="pizza-icon">
                    <p>Pizza</p>
                </section>
            </section>
            <section class="food-section" id="salad-section">
                <section class="section-title">
                    <img class="section-logo" src="./assets/logo/Icon-Salad.png" alt="salad-icon">
                    <p>Salad</p>
                </section>
            </section>
            </section>
            <section open class="sticky-wide-screen" id="sticky-wide-screen">
                <h2>Your Orders</h2>
                <section id="shopping-cart"></section>
                <section>
                    <table>
                        <tr>
                            <th>Subtotal: </th>
                            <td>00,00</td>
                        </tr>
                        <tr>
                            <th>Deilvery Fee: </th>
                            <td>5,00</td>
                        </tr>
                    </table>
                    <div class="separator"></div>
                    <table>
                        <tr>
                            <th>Total: </th>
                            <td>5,00</td>
                        </tr>
                    </table>
                </section>
                <button class="button-buy">Buy now</button>
            </section>
        </section>
    </main>
    <footer></footer>
</body>
</html>
